spring.application.name=iots

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iot_mqtt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MQTT
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${SPRING_PROFILES_ACTIVE:default}-${random.uuid}
mqtt.qos=${MQTT_QOS:1}

# Ingestion
ingestion.device-count=${DEVICE_COUNT:100}
ingestion.csv-path=real_time_data.csv

# Storage batch
storage.batch.size=500
storage.batch.flush-interval-ms=2000
